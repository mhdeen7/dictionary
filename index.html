<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>DICTIONARY</title>
</head>
<body>
    <header>
           <h1>Dictionary</h1>
     </header>
    <section class="dictionary">
      <div class="container">
         <input type="search" name="search" id="search" placeholder="Enter a word..." class="input">
         <button id="btn" class="btn">Search</button>
      </div>
      <div class="results">
           <p id="definitions">definitions</p>
           <p id="synonyms">synonyms</p>
           <p id="source-details">source details</p>
           <p id="pronunciation">pronunciation</p>

           <audio id="audio" controls></audio>
      </div>
    
    
    

      <div class="error-message" id="error">
          <p>word not found</p>
      </div>
    </section>  
    
</body>
</html>
